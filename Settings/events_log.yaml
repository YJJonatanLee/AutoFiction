history:
- sequence_id: 0
  title: 사건의 발단 (Inciting Incident)
  summary: 주인공의 평범한 일상에 추격자들이 들이닥치고, 조력자의 도움으로 간신히 탈출함.
  key_events:
  - 주인공이 의문의 물건을 획득함.
  - 조력자가 등장하여 적의 1차 공격을 막아냄.
  impacts:
  - CHAR_01의 상태가 '일상'에서 '도망자'로 변경됨.
  - PAYOFF_001 생성됨.
- sequence_id: 1
  title: 산길의 대가
  summary: 주인공은 부상당한 조력자를 데리고 산길을 넘어 추격자를 따돌리는 데 성공하지만, 조력자의 상태가 위험하며 '당신 아버지가 이 물건을
    맡겼다'는 충격적 고백이 터져 나왔다.
  key_events:
  - 주인공이 능선 우회로를 선택해 낡은 여관을 향해 이동 시작
  - 조력자의 옆구리 부상이 발각됨 — 어젯밤부터 방치된 상태
  - 추격자들이 산길로 진입하며 거리가 급격히 좁혀짐
  - 주인공이 물건을 버리고 혼자 도망치려는 충동과 싸움
  - 조력자가 쓰러지며 '당신 부모를 알았소 / 이 물건은 아버지가 맡긴 것'이라고 고백 (PAYOFF_002 트리거)
  - 추격자들이 경로를 잘못 잡아 능선 너머로 사라짐 — 위기 탈출
  - 낡은 여관 도착 성공, 그러나 조력자 상태 악화 (발열 임박)
  impacts:
  - 'PAYOFF_002 부분 해소: 조력자가 주인공 부모와 연관된 인물임이 드러남 (전모는 미공개)'
  - 조력자의 부상이 다음 행동의 발목을 잡는 새로운 외부 장애물로 부상
  - 주인공이 이기적 충동을 스스로 억누름 — 내면 성장의 첫 단계
  - 낡은 여관이 임시 안전 거점으로 확보되었으나 추격자들이 인근에 있음
- sequence_id: 2
  title: 여관 주인의 눈
  summary: 주인공은 여관 주인으로부터 의료 물자를 확보하는 데 성공하지만, 여관 주인이 십 년 전부터 이 일행의 내막을 알고 있는 인물임이
    드러나며 '나중에 다시 돌아와 진실을 알려줄 것'이라는 조건부 약속을 맺는다. 추격자들이 도로 쪽으로 재접근하며 새로운 위기가 시작됐다.
  key_events:
  - 주인공이 조력자의 붉은 선 상처를 확인하고 여관 주인에게 도움을 요청하러 부엌으로 향함
  - 여관 주인이 오른쪽 옆구리 상처를 먼저 언급하며 십 년 전에도 같은 상처를 입은 손님이 있었다고 밝힘 (PAYOFF_01_01 트리거)
  - 여관 주인이 소독포·봉합침·소염 연고가 든 함을 건네며 '나중에 진실을 알게 되면 돌아와 알려달라'는 조건을 제시
  - 여관 주인의 조카가 추격자들이 도로 쪽으로 재접근 중임을 알림
  - 주인공이 함 안쪽 뚜껑에서 인장 문양과 이니셜 두 글자를 발견함
  - 주인공이 조력자의 상처를 처치하고 여관 주인이 알려준 은신 공간에 몸을 숨김
  impacts:
  - 의료 물자 확보 성공 — 조력자의 상태 악화 임시 차단
  - 여관 주인이 단순 중립 인물이 아니라 주인공 일행의 과거와 연결된 정보 보유자임이 드러남 (PAYOFF_01_01 부분 해소, 완전 해소는
    미결)
  - 함의 인장·이니셜이 새로운 복선으로 등장
  - 추격자들이 도로로 재접근하며 여관이 더 이상 안전 거점이 아닐 수 있음
  - 주인공이 여관 주인에게 '돌아오겠다'는 약속을 맺어 이후 여정에 구속이 생김
